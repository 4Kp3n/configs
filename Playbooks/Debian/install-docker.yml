---
- name: Install Docker Engine on Debian / Kali
  hosts: localhost
  connection: local
  become: true
  vars:
    docker_gpg_url: "https://download.docker.com/linux/debian/gpg"
    docker_keyring_path: "/etc/apt/keyrings/docker.asc"
    # Kali identifies as rolling; Docker's repo only knows Debian stable codenames.
    # Bump this when Debian stable changes (currently trixie).
    docker_debian_codename_kali: "trixie"
    # User to add to the docker group. Falls back to the invoking shell user
    # when no inventory-based ansible_user is set (typical for local runs).
    docker_group_user: "{{ ansible_user | default(lookup('env', 'USER')) }}"

  tasks:
    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Ensure /etc/apt/keyrings exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Install Docker GPG key (ASCII-armored, no dearmor needed)
      ansible.builtin.get_url:
        url: "{{ docker_gpg_url }}"
        dest: "{{ docker_keyring_path }}"
        mode: "0644"

    - name: Determine dpkg architecture
      ansible.builtin.command: dpkg --print-architecture
      register: dpkg_arch
      changed_when: false

    - name: Determine Docker repo codename
      ansible.builtin.set_fact:
        docker_repo_codename: >-
          {{ docker_debian_codename_kali
             if 'Kali' in ansible_facts['distribution']
             else ansible_facts['distribution_release'] }}

    - name: Add Docker APT repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ dpkg_arch.stdout }} signed-by={{ docker_keyring_path }}] https://download.docker.com/linux/debian {{ docker_repo_codename }} stable"
        filename: docker
        state: present
        update_cache: true

    - name: Install Docker Engine, CLI, containerd, buildx and compose plugins
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Ensure docker service is enabled and started
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Add user to docker group
      ansible.builtin.user:
        name: "{{ docker_group_user }}"
        groups: docker
        append: true
      when: docker_group_user | length > 0